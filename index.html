<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이메일 드래프트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      font-size: 14px;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══ 헤더 ══ */
    header {
      background: #1a3a5c;
      color: white;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* ══ 탭 바 ══ */
    .tab-bar {
      display: flex;
      background: #14304e;
      padding: 0 16px;
      gap: 2px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-bar.is-dragging { cursor: grabbing; }

    /* 탭 그룹 (버튼 + 드롭다운 묶음) */
    .tab-group {
      position: relative;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border: none;
      background: transparent;
      color: #a0b8cc;
      font-size: 13px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #cce0f0; }
    .tab-btn.active {
      color: #ffffff;
      border-bottom-color: #5da8e0;
      background: rgba(255,255,255,0.06);
    }

    /* 언어 뱃지 */
    .lang-badge {
      font-size: 10px;
      font-weight: 700;
      color: #5da8e0;
      background: rgba(93,168,224,0.15);
      border: 1px solid rgba(93,168,224,0.4);
      border-radius: 3px;
      padding: 1px 4px;
      letter-spacing: 0.5px;
    }
    .tab-btn.active .lang-badge {
      background: rgba(93,168,224,0.25);
    }

    /* 언어 드롭다운 (position:fixed — overflow-x 클리핑 회피) */
    .lang-dropdown {
      display: none;
      position: fixed;
      z-index: 200;
      background: #1e4470;
      border-radius: 0 0 6px 6px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      overflow: hidden;
      flex-direction: column;
    }

    .lang-btn {
      padding: 9px 20px;
      border: none;
      background: transparent;
      color: #a0b8cc;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .lang-btn.active { color: #5da8e0; font-weight: bold; }
    .lang-btn + .lang-btn { border-top: 1px solid rgba(255,255,255,0.08); }

    /* ══ 탭 콘텐츠 ══ */
    .tab-content { display: none !important; }
    .tab-content.active {
      display: flex !important;
      gap: 16px;
      padding: 16px;
      flex: 1;
      align-items: flex-start;
    }

    /* ══ 왼쪽: 이메일 미리보기 ══ */
    .preview-panel {
      flex: 1.4;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .panel-header {
      background: #1a3a5c;
      color: white;
      padding: 8px 14px;
      font-weight: bold;
      font-size: 13px;
    }
    .email-wrap { padding: 20px 24px; }
    .email-field { margin-bottom: 14px; }
    .email-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .email-subject {
      font-weight: bold;
      font-size: 14px;
      color: #1a3a5c;
      padding: 8px 10px;
      background: #f4f7fb;
      border-left: 3px solid #1a3a5c;
      border-radius: 0 4px 4px 0;
      word-break: break-all;
    }
    .email-body {
      font-size: 13.5px;
      line-height: 1.85;
      color: #222;
      white-space: pre-wrap;
      padding: 10px;
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      min-height: 360px;
    }
    .copy-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #2a5080; }

    /* ══ 오른쪽: 입력 패널 ══ */
    .input-panel {
      flex: 0.7;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .input-wrap { padding: 16px; }
    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #444;
      margin-bottom: 4px;
    }
    .input-group input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-group input[type="text"]:focus {
      outline: none;
      border-color: #1a3a5c;
      box-shadow: 0 0 0 2px rgba(26,58,92,0.12);
    }
    .input-group input[type="text"]:disabled {
      background: #f0f0f0;
      color: #aaa;
      cursor: not-allowed;
    }
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #1a3a5c;
      background: #eef3f9;
      padding: 5px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .divider { border: none; border-top: 1px solid #e0e0e0; margin: 14px 0; }
    .checkbox-group {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .checkbox-group:hover { background: #f4f7fb; }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      cursor: pointer;
      accent-color: #1a3a5c;
    }
    .checkbox-group span { font-size: 13px; color: #333; font-weight: 500; }
    .checkbox-group.checked { background: #eef3f9; border-color: #1a3a5c; }
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 8px;
      background: #eee;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .reset-btn:hover { background: #ddd; }
    .sub-inputs {
      padding-left: 10px;
      border-left: 2px solid #c0d4e8;
      margin-bottom: 10px;
    }

    /* ══ 토스트 ══ */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #27ae60;
      color: white;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ════════════════════════════════════  SCRIPT  ════════════════════════════════════ -->
<script>

  /* ── 언어 상태 ── */
  const tabLang = { 'pre-alert': 'ko', 'customs': 'ko', 'invoice': 'ko', 'bond': 'ko' };

  /* ── 공통 유틸 ── */
  function val(id)     { return document.getElementById(id).value.trim(); }
  function esc(s)      { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function checked(id) { return document.getElementById(id).checked; }

  /* 국문 날짜: 6/1 → Jun. 1, 2026 */
  function fmtDate(raw) {
    if (!raw) return '___';
    const M = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
    const p = raw.split('/');
    if (p.length === 2) {
      const m = parseInt(p[0]), d = parseInt(p[1]);
      if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return `${M[m-1]} ${d}, 2026`;
    }
    return raw;
  }

  /* 영문 날짜: 6/1 → Jun 1, 2026 */
  function fmtDateEn(raw) {
    if (!raw) return '___';
    const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const p = raw.split('/');
    if (p.length === 2) {
      const m = parseInt(p[0]), d = parseInt(p[1]);
      if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return `${M[m-1]} ${d}, 2026`;
    }
    return raw;
  }

  /* 국문 월일: 7/1 → 7월 1일 */
  function fmtDateKo(raw) {
    if (!raw) return '___';
    const p = raw.split('/');
    if (p.length === 2) {
      const m = parseInt(p[0]), d = parseInt(p[1]);
      if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return `${m}월 ${d}일`;
    }
    return raw;
  }

  /* ── 복사 (공통) ── */
  function copyEmail(subjectId, bodyId) {
    const subjectEl   = subjectId ? document.getElementById(subjectId) : null;
    const bodyEl      = document.getElementById(bodyId);
    const subjectText = subjectEl ? subjectEl.textContent : '';

    const htmlContent =
      `<div style="font-family:'Malgun Gothic',sans-serif;font-size:14px;line-height:1.85;color:#222;">` +
      (subjectEl
        ? `<p style="margin:0 0 10px 0;"><b>제목: ${esc(subjectText)}</b></p>
           <hr style="border:none;border-top:1px solid #ccc;margin:8px 0 14px 0;">`
        : '') +
      bodyEl.innerHTML.replace(/\n/g, '<br>') +
      `</div>`;

    const plainText = (subjectEl ? `제목: ${subjectText}\n\n` : '') + bodyEl.innerText;

    if (window.ClipboardItem) {
      const item = new ClipboardItem({
        'text/html':  new Blob([htmlContent], { type: 'text/html' }),
        'text/plain': new Blob([plainText],   { type: 'text/plain' })
      });
      navigator.clipboard.write([item]).then(showToast).catch(() => fallbackCopy(bodyEl));
    } else {
      fallbackCopy(bodyEl);
    }
  }

  function fallbackCopy(bodyEl) {
    const div = document.createElement('div');
    div.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    div.innerHTML = bodyEl.innerHTML;
    document.body.appendChild(div);
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(div);
    sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    document.body.removeChild(div);
    showToast();
  }

  /* ── 탭 언어 드롭다운 (fixed 좌표 계산) ── */
  document.querySelectorAll('.tab-group').forEach(group => {
    const dropdown = group.querySelector('.lang-dropdown');
    if (!dropdown) return;
    let hideTimer = null;

    function showDropdown() {
      clearTimeout(hideTimer);
      const rect = group.getBoundingClientRect();
      dropdown.style.top       = rect.bottom + 'px';
      dropdown.style.left      = rect.left   + 'px';
      dropdown.style.minWidth  = rect.width  + 'px';
      dropdown.style.display   = 'flex';
    }
    function hideDropdown() {
      hideTimer = setTimeout(() => { dropdown.style.display = 'none'; }, 120);
    }

    group.addEventListener('mouseenter', showDropdown);
    group.addEventListener('mouseleave', hideDropdown);
    dropdown.addEventListener('mouseenter', () => clearTimeout(hideTimer));
    dropdown.addEventListener('mouseleave', hideDropdown);
  });

  /* ── 탭 바 드래그 스크롤 ── */
  (function () {
    const bar = document.querySelector('.tab-bar');
    let isDown = false, startX = 0, scrollLeft = 0, moved = false;

    bar.addEventListener('mousedown', e => {
      isDown    = true;
      moved     = false;
      startX    = e.pageX - bar.getBoundingClientRect().left;
      scrollLeft = bar.scrollLeft;
      bar.classList.add('is-dragging');
    });
    document.addEventListener('mouseup', () => {
      isDown = false;
      bar.classList.remove('is-dragging');
    });
    bar.addEventListener('mousemove', e => {
      if (!isDown) return;
      const x    = e.pageX - bar.getBoundingClientRect().left;
      const walk = x - startX;
      if (Math.abs(walk) > 5) moved = true;
      bar.scrollLeft = scrollLeft - walk;
    });
    /* 드래그 중 클릭 이벤트 차단 (탭 오작동 방지) */
    bar.addEventListener('click', e => {
      if (moved) { e.stopPropagation(); moved = false; }
    }, true);
  })();

</script>
